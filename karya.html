<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATE DESIGN | KARYA</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0a0a0a; color: white; min-height: 100vh; overflow-x: hidden; position: relative; }
        
        header { 
            background: #111; padding: 60px 8%; border-bottom: 5px solid #003366; text-align: center; 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://files.catbox.moe/rd5c7r.jpg');
            background-size: cover; background-position: center;
        }
        header h1 { font-size: 2.5rem; font-weight: 800; -webkit-text-stroke: 1px #003366; text-shadow: 3px 3px 0px #003366; }

        /* Chibi Secret Trigger */
        .chibi { 
            position: absolute; width: 110px; z-index: 50; 
            pointer-events: auto; cursor: pointer; animation: bounce 3s infinite; 
            transition: transform 0.1s;
        }
        .chibi:active { transform: scale(0.9); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Admin UI Elements */
        #admin-tab, #upload-form-container { 
            display: none; background: #111; padding: 25px; border-radius: 20px; 
            border: 3px solid #ff4757; width: 90%; max-width: 500px; 
            margin: 30px auto; text-align: center; box-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
        }
        input { 
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; 
            border: 1px solid #333; background: #222; color: white; outline: none; 
        }
        .btn-post { 
            width: 100%; padding: 15px; background: #ff4757; color: white; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; 
        }

        /* Gallery Layout */
        .gallery-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 50px 8%; }
        .work-card { background: #111; border-radius: 20px; border: 1px solid #333; padding: 15px; text-align: center; }
        .image-box { width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; border: 2px solid #003366; margin-bottom: 15px; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <img src="https://files.catbox.moe/8awfyi.png" id="secret-trigger" class="chibi" style="top:200px; left:15px;" alt="Admin Trigger">
    <img src="https://files.catbox.moe/70c7u2.png" class="chibi" style="top:550px; right:15px;" alt="Decoration">

    <header>
        <h1>HASIL KARYA FATE</h1>
        <div id="admin-tab" style="color:#ff4757; margin-top:10px; font-weight: bold;">POSTING GFX</div>
    </header>

    <div id="upload-form-container">
        <h2 style="color:#ff4757; margin-bottom:15px;">➕ POSTING KARYA</h2>
        <input type="text" id="p-name" placeholder="Nama Projek">
        <input type="text" id="p-img" placeholder="Link Gambar (Catbox)">
        <button class="btn-post" onclick="sendData()">UPLOAD KARYA 🚀</button>
        <button onclick="exitAdmin()" style="margin-top:15px; background:none; border:none; color:#555; cursor:pointer; text-decoration:underline;">Logout Admin</button>
    </div>

    <main class="gallery-container" id="main-gallery"></main>
